name: Pipeline DevOps End-to-End

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # -----------------------------------------------------------
  # FASE 1: CODE, BUILD (Dependencias) & TEST
  # -----------------------------------------------------------
  Integracion-Continua:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Código Fuente (Fase: Code)
        uses: actions/checkout@v4

      - name: 2. Configurar Entorno Python (Fase: Build - Preparación)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 3. Instalar Dependencias de la App
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. Ejecutar Pruebas Unitarias (Fase: Test)
        run: |
          pytest test_app.py

  # -----------------------------------------------------------
  # FASE 2: BUILD (Artefacto Docker) & RELEASE (Verificación)
  # -----------------------------------------------------------
  Empaquetado-Docker:
    needs: Integracion-Continua # No inicia si los tests fallan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: 1. Descargar Código Fuente
        uses: actions/checkout@v4

      - name: 2. Configurar Entorno Docker
        uses: docker/setup-buildx-action@v3

      - name: 3. Construir Imagen del Contenedor (Fase: Build / Release)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false # Se simula la creación del artefacto sin subirlo a un registro público aún
          tags: mi-app-devops:latest

  # -----------------------------------------------------------
  # FASE 3: DEPLOY (Despliegue Continuo)
  # -----------------------------------------------------------
  Despliegue-Produccion:
    needs: Empaquetado-Docker # Requiere que el contenedor se construya con éxito
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger de Despliegue Automático (Fase: Deploy)
        run: |
          echo "Notificando a la plataforma de hosting (Render / Railway)..."
          echo "El código ha pasado todas las fases previas de forma automatizada."
          echo "¡Despliegue en producción completado con éxito!"
          
          # NOTA OPCIONAL PARA NOTIFICAR A RENDER DE FORMA REAL:
          # Si usas Render, ellos te dan un "Deploy Hook URL". 
          # Descomentando la línea de abajo, GitHub le avisará a Render que se actualice:
          # curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
