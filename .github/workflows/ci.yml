name: Pipeline DevOps Completo

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  # -----------------------------------------------------------
  # FASE 1: TEST (Validación de Calidad de Código)
  # -----------------------------------------------------------
  Fase-Test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Correr tests (pytest)
        run: pytest -v

  # -----------------------------------------------------------
  # FASE 2: BUILD (Construcción del Artefacto Docker)
  # -----------------------------------------------------------
  Fase-Build:
    needs: Fase-Test # Espera a que los tests pasen
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Build imagen Docker
        run: docker build -t devops-demo .

  # -----------------------------------------------------------
  # FASE 3: DEPLOY (Despliegue Continuo a Producción)
  # -----------------------------------------------------------
  Fase-Deploy:
    needs: Fase-Build # Espera a que el Build de Docker termine con éxito
    runs-on: ubuntu-latest
    # Solo despliega si los cambios se hacen en la rama 'main' (Producción)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Ejecutar Despliegue Automático
        run: |
          echo "Iniciando la fase de Despliegue..."
          echo "Notificando a la plataforma de hosting que el contenedor está listo."
          echo "¡La aplicación está en vivo en el entorno de producción!"
          
          # NOTA: Cuando crees tu cuenta en Render, descomentarás la línea de abajo
          # y guardarás la URL en los Secrets de GitHub para que el deploy sea 100% real:
          # curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
